{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">Reply to {{ msg.sender.username }} - {{ msg.subject }}</div>
    <div class="card-body">
        <p><strong>Original message:</strong> {{ msg.body }}</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Your reply</label>
                <textarea name="reply" rows="4" class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Send Reply</button>
            <a href="{% url 'view_messages' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
