{% extends 'core/base.html' %}
{% block content %}
<h2>Find Friends</h2>
<form method="get" class="mb-3">
    <div class="input-group">
        <input type="text" name="q" class="form-control" placeholder="Search by name or username" value="{{ query }}">
        <button type="submit" class="btn btn-primary">Search</button>
    </div>
</form>
<div class="row">
    {% for user in users %}
    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-body d-flex align-items-center">
                <div class="flex-shrink-0">
                    <i class="fas fa-user-circle fa-3x"></i>
                </div>
                <div class="flex-grow-1 ms-3">
                    <h5 class="mb-1">{{ user.username }}</h5>
                    <small class="text-muted">{{ user.get_full_name }}</small>
                </div>
                <div>
                    {% if user.is_friend %}
                        <a href="{% url 'private_chat' user.username %}" class="btn btn-sm btn-primary">Message</a>
                    {% else %}
                        <a href="{% url 'send_friend_request' user.username %}" class="btn btn-sm btn-success">Add Friend</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No users found.</p>
    {% endfor %}
</div>
{% endblock %}
