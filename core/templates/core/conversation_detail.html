{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        <strong>{{ conversation.subject }}</strong>
    </div>
    <div class="card-body" style="max-height: 400px; overflow-y: auto;">
        {% for msg in messages %}
        <div class="mb-3 {% if msg.sender == user %}text-end{% endif %}">
            <div class="d-inline-block p-2 rounded {% if msg.sender == user %}bg-primary text-white{% else %}bg-secondary text-white{% endif %}" style="max-width: 70%;">
                {{ msg.message }}
            </div>
            <div class="small text-muted mt-1">
                {{ msg.sender.username }} • {{ msg.created_at|date:"M d, H:i" }}
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="card-footer">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-sm btn-success">Send Reply</button>
        </form>
    </div>
</div>
<a href="{% url 'conversations_list' %}" class="btn btn-secondary mt-3">Back to Conversations</a>
{% endblock %}
