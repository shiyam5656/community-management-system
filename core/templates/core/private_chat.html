{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        Chat with {{ other_user.username }}
    </div>
    <div class="card-body" id="chat-messages" style="height: 400px; overflow-y: auto;">
        {% for msg in messages %}
        <div class="mb-3 {% if msg.sender == user %}text-end{% endif %}">
            <div class="d-inline-block p-2 rounded {% if msg.sender == user %}bg-primary text-white{% else %}bg-secondary text-white{% endif %}" style="max-width: 70%;">
                {{ msg.content }}
            </div>
            <div class="small text-muted mt-1">
                {{ msg.sender.username }} • {{ msg.timestamp|date:"M d, H:i" }}
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="card-footer">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success mt-2">Send</button>
        </form>
    </div>
</div>
<script>
    var messagesDiv = document.getElementById('chat-messages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
</script>
{% endblock %}
